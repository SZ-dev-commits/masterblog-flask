<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flask Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Welcome to My Flask Blog!</h1>
    <div class="post">
        <h2>Post Title</h2>
        <p><em>Written by ...</em></p>
        <p>Post content</p>
    </div>
    <div class="post">
        <h2>Post Title</h2>
        <p><em>Written by ...</em></p>
        <p>Post content</p>
    </div>
    <div class="post">
        <h2>Post Title</h2>
        <p><em>Written by ...</em></p>
        <p>Post content</p>
    </div>
    <a href="/add" style="display: block; text-align: center; margin-bottom: 20px;">
    Add a new blog post
    </a>

    {% for post in posts %}
    <div class="post">
        <h2>{{ post.title }}</h2>
        <p><em>Written by {{ post.author }}</em></p>
        <p>{{ post.content }}</p>

        <!-- Like Button -->
        <a href="{{ url_for('like_post', post_id=post.id) }}" style="text-decoration: none;">
            <button type="button">
                👍 Like ({{ post.likes | default(0) }})
            </button>
        </a>

        <!-- Link to Update page -->
        <a href="{{ url_for('update', post_id=post.id) }}">Update</a>

        <!-- Delete link with the specific post id -->
        <a href="{{ url_for('delete', post_id=post.id) }}"
           style="color: red;"
           onclick="return confirm('Are you sure?')">Delete</a>
    </div>
    {% endfor %}

</body>
</html>
